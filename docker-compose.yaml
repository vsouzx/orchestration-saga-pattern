services:
  mysql-orders:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orders
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./orders-service/INIT.sql:/docker-entrypoint-initdb.d/01-orders.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysql-payments:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: payments
    ports:
      - "3308:3306"
    volumes:
      - mysql_payments_data:/var/lib/mysql
      - ./payments-service/INIT.sql:/docker-entrypoint-initdb.d/01-payments.sql:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-inventory:
    image: postgres:17
    container_name: inventory-postgres
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./inventory-service/INIT.sql:/docker-entrypoint-initdb.d/01-inventory.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory -d inventory_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-orchestrator:
    image: postgres:17
    container_name: orchestrator-postgres
    environment:
      POSTGRES_DB: saga_db
      POSTGRES_USER: saga
      POSTGRES_PASSWORD: saga
    ports:
      - "5433:5432"
    volumes:
      - postgres_orchestrator_data:/var/lib/postgresql/data
      - ./saga-orchestrator/INIT.sql:/docker-entrypoint-initdb.d/01-saga.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saga -d saga_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    hostname: redis
    restart: always

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"   # para acesso do host em dev
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Criando topicos Kafka (orchestration)..."

        # Reply topics
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic orders.replies \
          --partitions 3 \
          --config retention.ms=604800000

        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic inventory.replies \
          --partitions 3 \
          --config retention.ms=604800000

        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic payments.replies \
          --partitions 3 \
          --config retention.ms=604800000

        # Command topics
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic inventory.commands.reserve-stock \
          --partitions 3 \
          --config retention.ms=604800000

        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic inventory.commands.release-stock \
          --partitions 3 \
          --config retention.ms=604800000

        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic inventory.commands.confirm-reservation \
          --partitions 3 \
          --config retention.ms=604800000

        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic payments.commands.process-payment \
          --partitions 3 \
          --config retention.ms=604800000

        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic orders.commands.confirm-order \
          --partitions 3 \
          --config retention.ms=604800000

        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic orders.commands.cancel-order \
          --partitions 3 \
          --config retention.ms=604800000

        echo "Topicos criados:"
        kafka-topics --bootstrap-server kafka:9092 --list

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger
      - loki

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
      - jaeger

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083

  orders-service:
    image: vsouzx/orders-service-orchestration-saga:latest
    ports:
      - "8081:8081"
    environment:
      MYSQL_DSN: "root:root@tcp(mysql-orders:3306)/orders?parseTime=true"
      REDIS_ADDR: "redis:6379"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_ORDERS_REPLIES_TOPIC: "orders.replies"
      KAFKA_CONFIRM_ORDER_TOPIC: "orders.commands.confirm-order"
      KAFKA_CANCEL_ORDER_TOPIC: "orders.commands.cancel-order"
      OTEL_EXPORTER_ENDPOINT: "otel-collector:4317"
    depends_on:
      mysql-orders:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      otel-collector:
        condition: service_started

  payments-service:
    image: vsouzx/payments-service-orchestration-saga:latest
    ports:
      - "8083:8083"
    environment:
      MYSQL_DSN: "root:root@tcp(mysql-payments:3306)/payments?parseTime=true"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_PROCESS_PAYMENT_TOPIC: "payments.commands.process-payment"
      KAFKA_PAYMENTS_REPLIES_TOPIC: "payments.replies"
      OTEL_EXPORTER_ENDPOINT: "otel-collector:4317"
    depends_on:
      mysql-payments:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started

  inventory-service:
    image: vsouzx/inventory-service-orchestration-saga:latest
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-inventory:5432/inventory_db"
      SPRING_DATASOURCE_USERNAME: "inventory"
      SPRING_DATASOURCE_PASSWORD: "inventory"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    depends_on:
      postgres-inventory:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started

  saga-orchestrator:
    image: vsouzx/saga-orchestrator-orchestration-saga:latest
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-orchestrator:5432/saga_db"
      SPRING_DATASOURCE_USERNAME: "saga"
      SPRING_DATASOURCE_PASSWORD: "saga"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    depends_on:
      postgres-orchestrator:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started

volumes:
  mysql_data:
  mysql_payments_data:
  postgres_data:
  postgres_orchestrator_data:
